<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSjian35的仓库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --sidebar-bg: #161b22;
            --header-bg: linear-gradient(135deg, #312e81 0%, #4c1d95 50%, #6366f1 100%);
            --border: rgba(255,255,255,0.08);
            --border-light: rgba(255,255,255,0.05);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --selected: rgba(99, 102, 241, 0.15);
            --selected-border: rgba(99, 102, 241, 0.4);
            --hover: rgba(255,255,255,0.06);
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-light: #6e7681;
            --toolbar-bg: #161b22;
            --status-bg: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.95);
            --panel-bg-alt: rgba(22, 27, 34, 0.9);
            --input-bg: #0d1117;
            --overlay-bg: rgba(0, 0, 0, 0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* Header */
        .header {
            background: var(--header-bg);
            color: white;
            padding: 0 20px;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 2px 20px rgba(99, 102, 241, 0.15);
            position: relative;
        }
        .header h1 {
            font-size: 16px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, #c7d2fe 0%, #a5b4fc 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-title-icon {
            font-size: 20px;
            -webkit-text-fill-color: initial;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-home-btn {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .header-home-btn:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .admin-btn {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .admin-btn:hover { background: rgba(255,255,255,0.2); color: white; }
        .admin-btn.logged-in { background: rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.5); color: #a5b4fc; }

        /* Main Layout */
        .container {
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* Left Sidebar - Tree Navigation */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            overflow: hidden;
            padding: 8px 0 0;
            flex-shrink: 0;
            user-select: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .sidebar-bottom {
            flex-shrink: 0;
            padding: 0 0 12px;
            position: relative;
        }
        .sidebar-section-title {
            padding: 8px 16px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tree-item {
            display: flex;
            align-items: center;
            padding: 6px 8px 6px 12px;
            cursor: pointer;
            border-radius: 6px;
            margin: 1px 8px;
            gap: 6px;
            transition: all 0.2s ease;
            position: relative;
        }
        .tree-item:hover {
            background: var(--hover);
            transform: translateX(2px);
        }
        .tree-item.active {
            background: var(--selected);
            border: 1px solid var(--selected-border);
            margin: 0 7px;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.15);
        }
        .tree-toggle {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: var(--text-secondary);
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .tree-toggle.expanded { transform: rotate(90deg); }
        .tree-toggle.no-children { visibility: hidden; }
        .tree-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
        .tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-children { padding-left: 18px; display: none; }
        .tree-children.expanded { display: block; }

        /* Right Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .nav-buttons {
            display: flex; gap: 4px;
        }
        .nav-btn {
            width: 32px; height: 32px;
            border: none; background: transparent;
            border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: var(--text-secondary);
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) { background: var(--hover); color: var(--text); }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }

        /* Address Bar */
        .address-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--toolbar-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 4px;
            height: 34px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .address-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
        .address-bar .path-icon {
            padding: 0 6px; font-size: 16px; color: var(--text-secondary);
        }
        .address-bar .path-segment {
            padding: 4px 8px; cursor: pointer; border-radius: 4px;
            font-size: 13px; white-space: nowrap;
            transition: background 0.15s;
        }
        .address-bar .path-segment:hover { background: rgba(255,255,255,0.08); }
        .address-bar .path-segment::after {
            content: '\203A'; margin-left: 8px; color: var(--text-light); font-size: 14px;
        }
        .address-bar .path-segment:last-child::after { content: none; }
        .address-bar .path-segment:last-child { font-weight: 500; }

        .search-box {
            width: 200px; height: 34px;
            border: 1px solid var(--border);
            border-radius: 6px; padding: 0 10px;
            font-size: 13px; outline: none;
            background: var(--input-bg);
            color: var(--text);
            transition: all 0.2s;
        }
        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
        }
        .search-box::placeholder { color: var(--text-light); }

        .view-toggle {
            display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
        }
        .view-btn {
            width: 32px; height: 32px;
            border: none; background: var(--sidebar-bg); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: var(--text-secondary);
            transition: all 0.2s;
        }
        .view-btn:hover { background: var(--hover); color: var(--text); }
        .view-btn.active { background: var(--selected); color: var(--accent); }

        .toolbar-btn {
            height: 32px; padding: 0 12px;
            border: 1px solid var(--border); background: var(--sidebar-bg);
            border-radius: 6px; cursor: pointer; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap;
            color: var(--text);
            transition: all 0.2s;
        }
        .toolbar-btn:hover { background: var(--hover); }
        .toolbar-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .toolbar-btn.primary:hover { background: var(--accent-hover); box-shadow: 0 0 12px rgba(99,102,241,0.3); }
        .toolbar-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        /* Details View (List with columns) */
        .details-view {
            width: 100%; border-collapse: collapse;
        }
        .details-view thead {
            position: sticky; top: 0; z-index: 10;
            background: var(--toolbar-bg); border-bottom: 1px solid var(--border);
        }
        .details-view th {
            padding: 8px 12px; text-align: left; font-weight: 500;
            font-size: 12px; color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .details-view th:hover { background: rgba(255,255,255,0.05); }
        .details-view th .sort-arrow { margin-left: 4px; font-size: 10px; opacity: 0.5; }
        .details-view th.sort-asc .sort-arrow::after { content: '\25B2'; opacity: 1; }
        .details-view th.sort-desc .sort-arrow::after { content: '\25BC'; opacity: 1; }
        .details-view td {
            padding: 6px 12px; font-size: 13px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer; white-space: nowrap;
        }
        .details-view tr {
            transition: background 0.2s ease;
        }
        .details-view tbody tr:hover {
            background: var(--hover);
            box-shadow: 0 1px 0 0 rgba(99,102,241,0.08);
        }
        .details-view tbody tr.selected {
            background: var(--selected) !important;
            border-bottom: 1px solid var(--selected-border);
        }
        .details-view .col-name { display: flex; align-items: center; gap: 8px; }
        .details-view .file-icon { font-size: 20px; width: 24px; text-align: center; }
        .details-view .col-date, .details-view .col-type, .details-view .col-size {
            color: var(--text-secondary);
        }
        .col-name { width: 40%; min-width: 200px; }
        .col-date { width: 20%; min-width: 140px; }
        .col-type { width: 20%; min-width: 120px; }
        .col-size { width: 20%; min-width: 100px; }

        /* Large Icons View */
        .icons-view {
            display: flex; flex-wrap: wrap;
            padding: 16px; gap: 8px;
            align-content: flex-start;
        }
        .icon-item {
            width: 100px; padding: 12px 8px;
            display: flex; flex-direction: column;
            align-items: center; gap: 8px;
            border-radius: 8px; cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            user-select: none;
        }
        .icon-item:hover { background: var(--hover); border-color: var(--border); }
        .icon-item.selected {
            background: var(--selected);
            border-color: var(--selected-border);
            box-shadow: 0 0 12px rgba(99,102,241,0.15);
        }
        .icon-item .icon-emoji { font-size: 48px; line-height: 1; }
        .icon-item .icon-label {
            font-size: 12px; text-align: center;
            word-break: break-word; max-width: 100%;
            line-height: 1.3; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* List View */
        .list-view {
            display: flex; flex-direction: column;
            padding: 8px 0;
        }
        .list-item {
            display: flex; align-items: center;
            padding: 6px 16px; gap: 10px;
            cursor: pointer; border-radius: 6px;
            margin: 1px 8px; transition: all 0.2s ease;
            user-select: none;
        }
        .list-item:hover { background: var(--hover); }
        .list-item.selected {
            background: var(--selected);
            border: 1px solid var(--selected-border);
            margin: 0 7px;
        }
        .list-item .list-icon { font-size: 20px; width: 24px; text-align: center; }
        .list-item .list-name { flex: 1; font-size: 13px; }

        /* Empty State */
        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; color: var(--text-light);
            gap: 16px; padding: 40px;
        }
        .empty-state .empty-icon {
            font-size: 100px;
            opacity: 0.4;
            animation: float 3s ease-in-out infinite;
        }
        .empty-state .empty-text { font-size: 15px; }
        .empty-state .empty-subtext { font-size: 13px; color: var(--text-light); margin-top: -8px; }

        /* Status Bar */
        .status-bar {
            height: 28px; background: var(--status-bg);
            border-top: 1px solid var(--border-light);
            display: flex; align-items: center;
            padding: 0 16px; font-size: 12px;
            color: var(--text-secondary); flex-shrink: 0;
            justify-content: space-between;
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: var(--panel-bg-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding: 6px 0;
            z-index: 1000;
            min-width: 180px;
            display: none;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .context-menu-item {
            padding: 8px 16px; cursor: pointer;
            font-size: 13px; display: flex;
            align-items: center; gap: 8px;
            transition: all 0.15s;
        }
        .context-menu-item:hover {
            background: var(--hover);
            box-shadow: inset 0 0 0 1px rgba(99,102,241,0.1);
        }
        .context-menu-item.delete { color: #f87171; }
        .context-menu-item.delete:hover { background: rgba(239,68,68,0.1); }
        .context-menu-separator {
            height: 1px; background: var(--border-light);
            margin: 4px 0;
        }
        .context-menu-item .ctx-icon { font-size: 16px; width: 20px; text-align: center; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            display: none; justify-content: center;
            align-items: center; z-index: 2000;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--panel-bg);
            padding: 0;
            border-radius: 12px;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .modal-header {
            padding: 16px 20px 0;
            font-size: 16px; font-weight: 600;
            color: var(--text);
        }
        .modal-body { padding: 16px 20px; }
        .modal-body input {
            width: 100%; padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px; font-size: 14px;
            outline: none; margin-top: 8px;
            background: var(--input-bg);
            color: var(--text);
            transition: all 0.2s;
        }
        .modal-body input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
        }
        .modal-hint { font-size: 12px; color: var(--text-light); margin-top: 6px; }
        .admin-actions {
            display: none;
            align-items: center;
            gap: 8px;
            padding-left: 12px;
            margin-left: 8px;
            border-left: 1px solid var(--border);
        }
        .admin-actions.visible { display: flex; }
        .admin-actions .toolbar-btn { font-size: 12px; padding: 0 10px; height: 30px; }
        .modal-footer {
            padding: 12px 20px 16px;
            display: flex; gap: 10px; justify-content: flex-end;
        }
        .modal-btn {
            padding: 8px 16px; border: 1px solid var(--border);
            background: var(--sidebar-bg); border-radius: 6px; cursor: pointer; font-size: 13px;
            color: var(--text);
            transition: all 0.2s;
        }
        .modal-btn:hover { background: var(--hover); }
        .modal-btn.confirm { background: var(--accent); color: white; border-color: var(--accent); }
        .modal-btn.confirm:hover { background: var(--accent-hover); box-shadow: 0 0 12px rgba(99,102,241,0.3); }
        .modal-btn.delete { background: #dc2626; color: white; border-color: #dc2626; }
        .modal-btn.delete:hover { background: #b91c1c; }

        /* Toast */
        .toast-container {
            position: fixed; top: 68px; left: 50%;
            transform: translateX(-50%); z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 10px 20px; border-radius: 8px;
            font-size: 13px; color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-left: 3px solid currentColor;
        }
        .toast.success { background: rgba(34,197,94,0.9); }
        .toast.error { background: rgba(239,68,68,0.9); }
        .toast.info { background: rgba(99,102,241,0.9); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }

        .hidden { display: none !important; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ===== 个性化设置面板 ===== */
        .personal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .personal-overlay.show { display: flex; }
        .personal-panel {
            width: 400px;
            max-height: 80vh;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .personal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .personal-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin: 0;
        }
        .personal-close {
            width: 28px; height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }
        .personal-close:hover {
            background: var(--hover);
            color: var(--text);
        }
        .personal-body {
            padding: 12px 20px;
            overflow-y: auto;
        }
        .personal-section {
            margin-bottom: 20px;
        }
        .personal-section:last-child { margin-bottom: 0; }
        .personal-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .personal-options {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .personal-option {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .personal-option:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .personal-option.active {
            background: var(--selected);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
        .personal-option .preview-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            border: 1px solid var(--border);
        }

        /* ===== 主题变量 ===== */
        body.theme-dark {
            --bg: #0d1117;
            --sidebar-bg: #161b22;
            --header-bg: linear-gradient(135deg, #312e81 0%, #4c1d95 50%, #6366f1 100%);
            --border: rgba(255,255,255,0.08);
            --border-light: rgba(255,255,255,0.05);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --selected: rgba(99, 102, 241, 0.15);
            --selected-border: rgba(99, 102, 241, 0.4);
            --hover: rgba(255,255,255,0.06);
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-light: #6e7681;
            --toolbar-bg: #161b22;
            --status-bg: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.95);

        let isAdmin = localStorage.getItem('warehouse_admin') === 'true';

        let modalMode = 'input';

        let viewMode = 'details'; // details, list, icons
        let currentItems = []; // items in current view
        let allProjects = [];
        let allFolders = {}; // projectId -> folders[]
        let navHistory = [];
        let navIndex = -1;
        let sortField = 'name';
        let sortDir = 'asc';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            updateAdminUI();
            loadProjects();
            setupEventListeners();
            setView('details');
            // 延迟绑定 personal panel 的事件（HTML 在 script 之后）
            ['theme', 'font', 'density', 'sidebar', 'fontFamily'].forEach(bindPersonalOption);
            applyPersonalSettings(personalSettings);
            bindOverlayEvent();
          });

        function setupEventListeners() {
            const adminBtn = document.getElementById('adminBtn');
            adminBtn.addEventListener('click', async () => {
                if (isAdmin) return;
                showPasswordModal('请输入管理员密码', async (pwd) => {
                    try {
                        const res = await fetch('/api/admin/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password: pwd })
                        });
                        const result = await res.json();
                        if (result.success) {
                            isAdmin = true;
                            localStorage.setItem('warehouse_admin', 'true');
                            updateAdminUI();
                            showToast('已进入管理员模式', 'success');
                        } else {
                            showToast('密码错误', 'error');
                        }
                    } catch (e) {
                        showToast('验证失败', 'error');
                    }
                });
            });
            adminBtn.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (isAdmin) {
                    showConfirmModal('确定要退出管理员模式吗?', () => {
                        isAdmin = false;
                        localStorage.removeItem('warehouse_admin');
                        updateAdminUI();
                    });
                }
            });

            document.addEventListener('click', () => {
                document.getElementById('contextMenu').style.display = 'none';
            });

            document.getElementById('modalFile').addEventListener('change', handleFileSelect);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (selectedItems.length > 0 && isAdmin) deleteSelected();
                }
                if (e.key === 'Enter') {
                    if (selectedItems.length === 1) openItem(selectedItems[0]);
                }
                if (e.key === 'Escape') {
                    closeModal();
                    selectedItems = [];
                    renderItems();
                }
            });

            // Content area click to deselect
            document.getElementById('contentArea').addEventListener('click', (e) => {
                if (e.target.id === 'contentArea' || e.target.id === 'itemsContainer' || e.target.classList.contains('icons-view')) {
                    selectedItems = [];
                    renderItems();
                }
            });

            // Context menu items
            document.querySelectorAll('.context-menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    const action = item.dataset.action;
                    handleContextAction(action);
                });
            });
        }

        function updateAdminUI() {
            const adminBtn = document.getElementById('adminBtn');
            const adminActions = document.getElementById('adminActions');
            if (isAdmin) {
                adminBtn.textContent = '管理员模式 (已登录)';
                adminBtn.classList.add('logged-in');
                if (adminActions) adminActions.classList.add('visible');
            } else {
                adminBtn.textContent = '管理员模式';
                adminBtn.classList.remove('logged-in');
                if (adminActions) adminActions.classList.remove('visible');
            }
        }

        // ==================== API Helpers ====================
        async function apiGet(url) {
            const res = await fetch(API_BASE + url);
            return res.json();
        }
        async function apiPost(url, data) {
            const res = await fetch(API_BASE + url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }
        async function apiDelete(url) {
            const res = await fetch(API_BASE + url, { method: 'DELETE' });
            return res.json();
        }

        // ==================== Navigation History ====================
        function pushNavState(projectId, folderId) {
            const state = { projectId, folderId };
            // Remove forward history if we navigate from middle
            if (navIndex < navHistory.length - 1) {
                navHistory = navHistory.slice(0, navIndex + 1);
            }
            navHistory.push(state);
            navIndex = navHistory.length - 1;
            updateNavButtons();
        }
        function navBack() {
            if (navIndex > 0) {
                navIndex--;
                const state = navHistory[navIndex];
                navigateTo(state.projectId, state.folderId, false);
                updateNavButtons();
            }
        }
        function navForward() {
            if (navIndex < navHistory.length - 1) {
                navIndex++;
                const state = navHistory[navIndex];
                navigateTo(state.projectId, state.folderId, false);
                updateNavButtons();
            }
        }
        function navUp() {
            if (currentFolder) {
                navigateTo(currentProject, null);
            } else if (currentProject) {
                currentProject = null;
                currentFolder = null;
                showEmptyState();
                updateAddressBar();
                updateStatusBar();
                loadProjects();
            }
        }
        function updateNavButtons() {
            document.getElementById('btnBack').disabled = navIndex <= 0;
            document.getElementById('btnForward').disabled = navIndex >= navHistory.length - 1;
        }

        // ==================== Tree & Navigation ====================
        async function loadProjects() {
            allProjects = await apiGet('/api/projects');
            renderTree();
        }

        function renderTree() {
            const root = document.getElementById('treeRoot');
            root.innerHTML = '';
            allProjects.forEach(p => {
                const item = createTreeItem(p, 0);
                root.appendChild(item);
            });
        }

        function createTreeItem(project, level) {
            const wrapper = document.createElement('div');
            wrapper.className = 'tree-wrapper';
            wrapper.dataset.projectId = project.id;

            const row = document.createElement('div');
            row.className = 'tree-item' + (currentProject === project.id && !currentFolder ? ' active' : '');
            row.style.paddingLeft = (12 + level * 16) + 'px';
            row.innerHTML = `
                <span class="tree-toggle no-children" data-project="${project.id}">▶</span>
                <span class="tree-icon">📦</span>
                <span class="tree-label">${escapeHtml(project.name)}</span>
            `;
            row.addEventListener('click', () => navigateTo(project.id, null));
            row.addEventListener('contextmenu', (e) => showContextMenu(e, 'project', project.id));

            // Toggle expand
            const toggle = row.querySelector('.tree-toggle');
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                expandProject(project.id, toggle);
            });

            wrapper.appendChild(row);

            const childrenContainer = document.createElement('div');
            childrenContainer.className = 'tree-children';
            childrenContainer.id = 'tree-children-' + project.id;
            wrapper.appendChild(childrenContainer);

            return wrapper;
        }

        async function expandProject(projectId, toggleEl) {
            const container = document.getElementById('tree-children-' + projectId);
            if (container.classList.contains('expanded')) {
                container.classList.remove('expanded');
                if (toggleEl) toggleEl.classList.remove('expanded');
                return;
            }

            // Load folders if not loaded
            if (!container.dataset.loaded) {
                try {
                    const folders = await apiGet(`/api/projects/${projectId}/folders`);
                    allFolders[projectId] = folders;
                    container.innerHTML = '';
                    folders.forEach(f => {
                        const fRow = document.createElement('div');
                        fRow.className = 'tree-item' + (currentFolder === f.id ? ' active' : '');
                        fRow.style.paddingLeft = '34px';
                        fRow.innerHTML = `
                            <span class="tree-icon">📁</span>
                            <span class="tree-label">${escapeHtml(f.name)}</span>
                        `;
                        fRow.addEventListener('click', (e) => {
                            e.stopPropagation();
                            navigateTo(projectId, f.id);
                        });
                        fRow.addEventListener('contextmenu', (e) => showContextMenu(e, 'folder', f.id));
                        container.appendChild(fRow);
                    });
                    container.dataset.loaded = 'true';
                } catch (e) {
                    container.innerHTML = '<div style="padding:4px 30px;color:#999;font-size:12px;">无法加载</div>';
                }
            }

            container.classList.add('expanded');
            if (toggleEl) toggleEl.classList.remove('no-children');
            if (toggleEl) toggleEl.classList.add('expanded');
        }

        async function navigateTo(projectId, folderId, pushHistory = true) {
            currentProject = projectId;
            currentFolder = folderId;
            selectedItems = [];
            searchQuery = '';
            document.getElementById('searchBox').value = '';

            if (pushHistory) pushNavState(projectId, folderId);

            // Update tree active states
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
            if (folderId) {
                // Find folder in tree and activate
                const treeChildren = document.getElementById('tree-children-' + projectId);
                if (treeChildren) {
                    Array.from(treeChildren.children).forEach(child => {
                        if (child.textContent.includes(getFolderName(projectId, folderId))) {
                            child.classList.add('active');
                        }
                    });
                }
            } else {
                const treeWrappers = document.querySelectorAll('.tree-wrapper');
                treeWrappers.forEach(w => {
                    if (parseInt(w.dataset.projectId) === projectId) {
                        w.querySelector('.tree-item').classList.add('active');
                    }
                });
            }

            // Load contents
            await loadContents();
            updateAddressBar();
            updateStatusBar();
        }

        function getFolderName(projectId, folderId) {
            const folders = allFolders[projectId] || [];
            const f = folders.find(x => x.id === folderId);
            return f ? f.name : '';
        }

        // ==================== Content Loading ====================
        async function loadContents() {
            if (!currentProject) {
                showEmptyState();
                return;
            }

            const items = [];

            // If at project root, show folders + files
            if (!currentFolder) {
                const folders = await apiGet(`/api/projects/${currentProject}/folders`);
                allFolders[currentProject] = folders;
                folders.forEach(f => {
                    items.push({
                        id: f.id, type: 'folder', name: f.name,
                        date: f.created_at || '-', itemType: '文件夹', size: '-'
                    });
                });
                const files = await apiGet(`/api/files?parent_id=${currentProject}&parent_type=project`);
                files.forEach(f => {
                    items.push({
                        id: f.id, type: 'file', name: f.name,
                        date: f.created_at || '-', itemType: f.type || '文件',
                        size: f.size ? formatSize(f.size) : '-', rawType: f.type
                    });
                });
            } else {
                // In folder, show only files
                const files = await apiGet(`/api/files?parent_id=${currentFolder}&parent_type=folder`);
                files.forEach(f => {
                    items.push({
                        id: f.id, type: 'file', name: f.name,
                        date: f.created_at || '-', itemType: f.type || '文件',
                        size: f.size ? formatSize(f.size) : '-', rawType: f.type
                    });
                });
            }

            currentItems = items;
            sortItems();
            renderItems();
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('itemsContainer').classList.remove('hidden');
        }

        function showEmptyState() {
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('itemsContainer').classList.add('hidden');
            document.getElementById('statusLeft').textContent = '0 个项目';
        }

        // ==================== Sorting & Filtering ====================
        function sortItems() {
            currentItems.sort((a, b) => {
                // Folders always first
                if (a.type === 'folder' && b.type !== 'folder') return -1;
                if (a.type !== 'folder' && b.type === 'folder') return 1;
                let cmp = 0;
                if (sortField === 'name') cmp = a.name.localeCompare(b.name, 'zh-CN');
                else if (sortField === 'date') cmp = (a.date || '').localeCompare(b.date || '');
                else if (sortField === 'type') cmp = (a.itemType || '').localeCompare(b.itemType || '');
                else if (sortField === 'size') {
                    const sa = parseSize(a.size); const sb = parseSize(b.size);
                    cmp = sa - sb;
                }
                return sortDir === 'asc' ? cmp : -cmp;
            });
        }

        function parseSize(s) {
            if (!s || s === '-') return 0;
            const units = { 'B':1, 'KB':1024, 'MB':1024*1024, 'GB':1024*1024*1024 };
            const parts = s.split(' ');
            if (parts.length === 2) {
                const n = parseFloat(parts[0]); const u = parts[1];
                return n * (units[u] || 1);
            }
            return parseFloat(s) || 0;
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchBox').value.trim().toLowerCase();
            renderItems();
        }

        // ==================== Rendering ====================
        function renderItems() {
            const container = document.getElementById('itemsContainer');
            const filtered = searchQuery
                ? currentItems.filter(i => i.name.toLowerCase().includes(searchQuery))
                : [...currentItems];

            if (viewMode === 'details') {
                container.innerHTML = renderDetailsView(filtered);
                attachRowEvents();
            } else if (viewMode === 'list') {
                container.innerHTML = renderListView(filtered);
                attachListEvents();
            } else {
                container.innerHTML = renderIconsView(filtered);
                attachIconEvents();
            }
            updateStatusBar(filtered.length);
        }

        function renderDetailsView(items) {
            if (items.length === 0) {
                return `<div style="padding:40px;text-align:center;color:#999;">此文件夹为空</div>`;
            }
            return `
                <table class="details-view">
                    <thead>
                        <tr>
                            <th class="col-name" onclick="setSort('name')">名称 <span class="sort-arrow">${sortField==='name'?(sortDir==='asc'?'▲':'▼'):''}</span></th>
                            <th class="col-date" onclick="setSort('date')">修改日期 <span class="sort-arrow">${sortField==='date'?(sortDir==='asc'?'▲':'▼'):''}</span></th>
                            <th class="col-type" onclick="setSort('type')">类型 <span class="sort-arrow">${sortField==='type'?(sortDir==='asc'?'▲':'▼'):''}</span></th>
                            <th class="col-size" onclick="setSort('size')">大小 <span class="sort-arrow">${sortField==='size'?(sortDir==='asc'?'▲':'▼'):''}</span></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map(item => {
                            const icon = item.type === 'folder' ? '📁' : getFileIcon(item.rawType);
                            const selected = selectedItems.find(s => s.id === item.id && s.type === item.type) ? 'selected' : '';
                            return `<tr class="${selected}" data-id="${item.id}" data-type="${item.type}">
                                <td><div class="col-name"><span class="file-icon">${icon}</span>${escapeHtml(item.name)}</div></td>
                                <td class="col-date">${item.date}</td>
                                <td class="col-type">${item.itemType}</td>
                                <td class="col-size">${item.size}</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderListView(items) {
            if (items.length === 0) {
                return `<div style="padding:40px;text-align:center;color:#999;">此文件夹为空</div>`;
            }
            return `<div class="list-view">
                ${items.map(item => {
                    const icon = item.type === 'folder' ? '📁' : getFileIcon(item.rawType);
                    const selected = selectedItems.find(s => s.id === item.id && s.type === item.type) ? 'selected' : '';
                    return `<div class="list-item ${selected}" data-id="${item.id}" data-type="${item.type}">
                        <span class="list-icon">${icon}</span>
                        <span class="list-name">${escapeHtml(item.name)}</span>
                    </div>`;
                }).join('')}
            </div>`;
        }

        function renderIconsView(items) {
            if (items.length === 0) {
                return `<div style="padding:40px;text-align:center;color:#999;">此文件夹为空</div>`;
            }
            return `<div class="icons-view">
                ${items.map(item => {
                    const icon = item.type === 'folder' ? '📁' : getFileIcon(item.rawType);
                    const selected = selectedItems.find(s => s.id === item.id && s.type === item.type) ? 'selected' : '';
                    return `<div class="icon-item ${selected}" data-id="${item.id}" data-type="${item.type}">
                        <span class="icon-emoji">${icon}</span>
                        <span class="icon-label">${escapeHtml(item.name)}</span>
                    </div>`;
                }).join('')}
            </div>`;
        }

        function attachRowEvents() {
            document.querySelectorAll('.details-view tbody tr').forEach(row => {
                row.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(row.dataset.id);
                    const type = row.dataset.type;
                    if (e.ctrlKey || e.metaKey) {
                        toggleSelect(id, type);
                    } else if (e.shiftKey) {
                        // Range select
                        const allIds = Array.from(document.querySelectorAll('.details-view tbody tr')).map(r => ({ id: parseInt(r.dataset.id), type: r.dataset.type }));
                        if (selectedItems.length > 0) {
                            const last = selectedItems[selectedItems.length - 1];
                            const lastIdx = allIds.findIndex(x => x.id === last.id && x.type === last.type);
                            const curIdx = allIds.findIndex(x => x.id === id && x.type === type);
                            const start = Math.min(lastIdx, curIdx);
                            const end = Math.max(lastIdx, curIdx);
                            for (let i = start; i <= end; i++) {
                                if (!selectedItems.find(s => s.id === allIds[i].id && s.type === allIds[i].type)) {
                                    selectedItems.push(allIds[i]);
                                }
                            }
                        } else {
                            selectedItems.push({ id, type });
                        }
                        renderItems();
                    } else {
                        selectedItems = [{ id, type }];
                        renderItems();
                    }
                });
                row.addEventListener('dblclick', () => {
                    const id = parseInt(row.dataset.id);
                    const type = row.dataset.type;
                    openItem({ id, type });
                });
                row.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const id = parseInt(row.dataset.id);
                    const type = row.dataset.type;
                    if (!selectedItems.find(s => s.id === id && s.type === type)) {
                        selectedItems = [{ id, type }];
                        renderItems();
                    }
                    showContextMenu(e, type, id);
                });
            });
        }

        function attachListEvents() {
            document.querySelectorAll('.list-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(item.dataset.id);
                    const type = item.dataset.type;
                    if (e.ctrlKey || e.metaKey) {
                        toggleSelect(id, type);
                    } else {
                        selectedItems = [{ id, type }];
                        renderItems();
                    }
                });
                item.addEventListener('dblclick', () => {
                    openItem({ id: parseInt(item.dataset.id), type: item.dataset.type });
                });
                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const id = parseInt(item.dataset.id);
                    const type = item.dataset.type;
                    if (!selectedItems.find(s => s.id === id && s.type === type)) {
                        selectedItems = [{ id, type }];
                        renderItems();
                    }
                    showContextMenu(e, type, id);
                });
            });
        }

        function attachIconEvents() {
            document.querySelectorAll('.icon-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(item.dataset.id);
                    const type = item.dataset.type;
                    if (e.ctrlKey || e.metaKey) {
                        toggleSelect(id, type);
                    } else {
                        selectedItems = [{ id, type }];
                        renderItems();
                    }
                });
                item.addEventListener('dblclick', () => {
                    openItem({ id: parseInt(item.dataset.id), type: item.dataset.type });
                });
                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const id = parseInt(item.dataset.id);
                    const type = item.dataset.type;
                    if (!selectedItems.find(s => s.id === id && s.type === type)) {
                        selectedItems = [{ id, type }];
                        renderItems();
                    }
                    showContextMenu(e, type, id);
                });
            });
        }

        function toggleSelect(id, type) {
            const idx = selectedItems.findIndex(s => s.id === id && s.type === type);
            if (idx >= 0) selectedItems.splice(idx, 1);
            else selectedItems.push({ id, type });
            renderItems();
        }

        function openItem(item) {
            if (item.type === 'folder') {
                navigateTo(currentProject, item.id);
            } else {
                previewFile(item.id);
            }
        }

        // ==================== File Preview ====================
        function previewFile(id) {
            let file = currentItems.find(f => f.id === id);
            if (!file) {
                fetch(API_BASE + '/api/files/' + id).then(r => r.json()).then(data => {
                    if (data.error) return;
                    openFilePreview(data);
                });
                return;
            }
            openFilePreview(file);
        }
        function openFilePreview(file) {
            // 所有文件统一走服务端预览接口，新标签页打开
            window.open(API_BASE + '/api/files/' + file.id + '/preview', '_blank');
        }

        function setSort(field) {
            if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
            else { sortField = field; sortDir = 'asc'; }
            sortItems();
            renderItems();
        }

        function setView(mode) {
            viewMode = mode;
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === mode);
            });
            renderItems();
        }

        // ==================== Address Bar ====================
        function updateAddressBar() {
            const bar = document.getElementById('addressBar');
            if (!currentProject) {
                bar.innerHTML = '<span class="path-icon">📦</span><span class="path-segment">仓库</span>';
                return;
            }
            const project = allProjects.find(p => p.id === currentProject);
            const projectName = project ? project.name : '项目';
            let html = `<span class="path-icon">📦</span>`;
            html += `<span class="path-segment" onclick="navigateTo(${currentProject}, null)">${escapeHtml(projectName)}</span>`;
            if (currentFolder) {
                const folderName = getFolderName(currentProject, currentFolder);
                html += `<span class="path-segment">${escapeHtml(folderName)}</span>`;
            }
            bar.innerHTML = html;
        }

        function updateStatusBar(count) {
            const total = currentItems.length;
            const selected = selectedItems.length;
            if (count !== undefined) {
                document.getElementById('statusLeft').textContent = `${count} 个项目`;
            } else {
                document.getElementById('statusLeft').textContent = `${total} 个项目`;
            }
            if (selected > 0) {
                document.getElementById('statusRight').textContent = `已选择 ${selected} 个`;
            } else {
                document.getElementById('statusRight').textContent = '';
            }
        }

        // ==================== Context Menu ====================
        function showContextMenu(e, type, id) {
            if (!isAdmin && type !== 'project' && type !== 'folder') return;
            e.preventDefault();
            contextTarget = { type, id };
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'block';
            menu.style.left = Math.min(e.pageX, window.innerWidth - 200) + 'px';
            menu.style.top = Math.min(e.pageY, window.innerHeight - 200) + 'px';

            // Hide/show items based on context
            const items = menu.querySelectorAll('.context-menu-item');
            items.forEach(item => {
                const action = item.dataset.action;
                if (!isAdmin) {
                    if (['addFile','addFolder','addProject','delete'].includes(action)) {
                        item.style.display = 'none';
                    } else {
                        item.style.display = 'flex';
                    }
                } else {
                    item.style.display = 'flex';
                }
                // Disable open/download for folders/files appropriately
                if (action === 'open') {
                    item.style.display = (type === 'folder' || type === 'file') ? 'flex' : 'none';
                    item.querySelector('.ctx-icon').textContent = type === 'folder' ? '📂' : '▶';
                    item.childNodes[1].textContent = type === 'folder' ? '打开' : '打开';
                }
                if (action === 'download') {
                    item.style.display = type === 'file' ? 'flex' : 'none';
                }
            });
        }

        function handleContextAction(action) {
            if (action === 'open') {
                if (contextTarget) openItem({ id: contextTarget.id, type: contextTarget.type });
            } else if (action === 'download') {
                if (contextTarget && contextTarget.type === 'file') downloadFile(contextTarget.id);
            } else if (action === 'addFile') {
                showAddFile();
            } else if (action === 'addFolder') {
                showAddFolder();
            } else if (action === 'addProject') {
                showAddProject();
            } else if (action === 'delete') {
                if (selectedItems.length > 0) deleteSelected();
                else if (contextTarget) deleteItem(contextTarget.type, contextTarget.id);
            }
        }

        // ==================== CRUD Operations ====================
        function showAddProject() {
            if (!isAdmin) return;
            showModal('添加项目', '请输入项目名称', (name) => {
                apiPost('/api/projects', { name }).then(() => {
                    loadProjects();
                    showToast('项目已创建', 'success');
                }).catch(() => showToast('创建失败', 'error'));
            });
        }

        function showAddFolder() {
            if (!isAdmin) return;
            if (!currentProject) { showToast('请先选择一个项目', 'error'); return; }
            showModal('添加文件夹', '请输入文件夹名称', (name) => {
                apiPost('/api/folders', { name, project_id: currentProject }).then(() => {
                    // Refresh
                    if (currentProject) {
                        const container = document.getElementById('tree-children-' + currentProject);
                        if (container) container.dataset.loaded = '';
                        loadContents();
                    }
                    showToast('文件夹已创建', 'success');
                }).catch(() => showToast('创建失败', 'error'));
            });
        }

        function showAddFile() {
            if (!isAdmin) return;
            if (!currentProject) { showToast('请先选择一个项目或文件夹', 'error'); return; }
            document.getElementById('modalTitle').textContent = '添加文件';
            document.getElementById('modalInput').classList.add('hidden');
            document.getElementById('modalPassword').classList.add('hidden');
            document.getElementById('modalFile').classList.remove('hidden');
            document.getElementById('modalOverlay').classList.add('active');
            modalCallback = null;
            modalMode = 'file';
        }

        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const parentId = currentFolder || currentProject;
            const parentType = currentFolder ? 'folder' : 'project';
            const formData = new FormData();
            formData.append('file', file);
            formData.append('parent_id', parentId);
            formData.append('parent_type', parentType);
            try {
                await fetch(API_BASE + '/api/files', { method: 'POST', body: formData });
                closeModal();
                await loadContents();
                showToast('文件上传成功', 'success');
            } catch (err) {
                showToast('上传失败', 'error');
            }
        }

        async function deleteItem(type, id) {
            if (!isAdmin) return;
            if (!confirm('确定要删除吗?')) return;
            try {
                if (type === 'project') {
                    await apiDelete(`/api/projects/${id}`);
                    if (currentProject === id) { currentProject = null; currentFolder = null; showEmptyState(); }
                    loadProjects();
                } else if (type === 'folder') {
                    await apiDelete(`/api/folders/${id}`);
                    if (currentFolder === id) currentFolder = null;
                    // Refresh tree and content
                    if (currentProject) {
                        const container = document.getElementById('tree-children-' + currentProject);
                        if (container) container.dataset.loaded = '';
                    }
                    await loadContents();
                } else if (type === 'file') {
                    await apiDelete(`/api/files/${id}`);
                    await loadContents();
                }
                selectedItems = selectedItems.filter(s => !(s.id === id && s.type === type));
                showToast('删除成功', 'success');
            } catch (err) {
                showToast('删除失败', 'error');
            }
        }

        function deleteSelected() {
            if (!isAdmin || selectedItems.length === 0) return;
            if (!confirm(`确定要删除选中的 ${selectedItems.length} 个项目吗?`)) return;
            selectedItems.forEach(item => deleteItem(item.type, item.id));
            selectedItems = [];
        }

        function downloadFile(id) {
            window.open(API_BASE + `/api/files/${id}/download`);
        }

        // ==================== Modals ====================
        function showModal(title, placeholder, callback) {
            document.getElementById('modalTitle').textContent = title;
            const input = document.getElementById('modalInput');
            input.placeholder = placeholder || '请输入名称';
            input.value = '';
            input.classList.remove('hidden');
            document.getElementById('modalPassword').classList.add('hidden');
            document.getElementById('modalFile').classList.add('hidden');
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalConfirmBtn').className = 'modal-btn confirm';
            document.getElementById('modalConfirmBtn').textContent = '确定';
            modalCallback = callback;
            modalMode = 'input';
            setTimeout(() => input.focus(), 100);
        }

        function showPasswordModal(title, callback) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalInput').classList.add('hidden');
            document.getElementById('modalFile').classList.add('hidden');
            const pwd = document.getElementById('modalPassword');
            pwd.classList.remove('hidden');
            pwd.value = '';
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalConfirmBtn').className = 'modal-btn confirm';
            document.getElementById('modalConfirmBtn').textContent = '确定';
            modalCallback = callback;
            modalMode = 'password';
            setTimeout(() => pwd.focus(), 100);
        }

        function showConfirmModal(title, callback) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalInput').classList.add('hidden');
            document.getElementById('modalPassword').classList.add('hidden');
            document.getElementById('modalFile').classList.add('hidden');
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalConfirmBtn').className = 'modal-btn confirm';
            document.getElementById('modalConfirmBtn').textContent = '确定';
            modalCallback = callback;
            modalMode = 'confirm';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('modalFile').value = '';
            modalCallback = null;
        }

        function confirmModal() {
            if (modalMode === 'password') {
                const pwd = document.getElementById('modalPassword');
                if (modalCallback && pwd.value.trim()) {
                    modalCallback(pwd.value.trim());
                    closeModal();
                }
            } else if (modalMode === 'confirm') {
                if (modalCallback) modalCallback();
                closeModal();
            } else if (modalMode === 'file') {
                closeModal();
            } else {
                const input = document.getElementById('modalInput');
                if (modalCallback && input.value.trim()) {
                    modalCallback(input.value.trim());
                    closeModal();
                }
            }
        }

        document.getElementById('modalInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmModal(); });
        document.getElementById('modalPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmModal(); });

        // ==================== Utilities ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatSize(bytes) {
            if (!bytes || bytes === 0) return '-';
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + sizes[Math.min(i, 3)];
        }

        function getFileIcon(type) {
            if (!type) return '📄';
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📕';
            if (type.includes('zip') || type.includes('rar') || type.includes('7z')) return '📦';
            if (type.includes('word') || type.includes('document') || type.includes('msword')) return '📝';
            if (type.includes('excel') || type.includes('sheet') || type.includes('csv')) return '📊';
            if (type.includes('powerpoint') || type.includes('presentation')) return '📽️';
            if (type.includes('javascript') || type.includes('html') || type.includes('css') || type.includes('json') || type.includes('code')) return '💻';
            if (type.includes('text') || type.includes('plain')) return '📃';
            return '📄';
        }

        // ==================== Personalization Settings ====================
        const PERSONAL_CONFIG = {
            theme: { dark: 'theme-dark', light: 'theme-light', mint: 'theme-mint', beige: 'theme-beige', starry: 'theme-starry' },
            font: { small: 'font-small', medium: 'font-medium', large: 'font-large', xlarge: 'font-xlarge' },
            density: { compact: 'density-compact', comfort: '', loose: 'density-loose' },
            sidebar: { narrow: 'sidebar-narrow', medium: '', wide: 'sidebar-wide' },
            fontFamily: { system: 'font-system', serif: 'font-serif', sans: 'font-sans', mono: 'font-mono' }
        };

        let personalSettings = { theme: 'light', font: 'medium', density: 'comfort', sidebar: 'medium', fontFamily: 'system' };
        try { Object.assign(personalSettings, JSON.parse(localStorage.getItem('warehouseSettings') || '{}')); } catch (e) {}

        function applyPersonalSettings(s) {
            s = s || personalSettings;
            // theme
            clearPersonalClasses('theme', PERSONAL_CONFIG.theme);
            const tc = PERSONAL_CONFIG.theme[s.theme || 'light'];
            if (tc) document.body.classList.add(tc);
            setPersonalActive('theme', s.theme || 'light');
            // font
            clearPersonalClasses('font', PERSONAL_CONFIG.font);
            const fc = PERSONAL_CONFIG.font[s.font || 'medium'];
            if (fc) document.body.classList.add(fc);
            setPersonalActive('font', s.font || 'medium');
            // density
            clearPersonalClasses('density', PERSONAL_CONFIG.density);
            const dc = PERSONAL_CONFIG.density[s.density || 'comfort'];
            if (dc) document.body.classList.add(dc);
            setPersonalActive('density', s.density || 'comfort');
            // sidebar
            clearPersonalClasses('sidebar', PERSONAL_CONFIG.sidebar);
            const sc = PERSONAL_CONFIG.sidebar[s.sidebar || 'medium'];
            if (sc) document.body.classList.add(sc);
            setPersonalActive('sidebar', s.sidebar || 'medium');
            // fontFamily
            clearPersonalClasses('fontFamily', PERSONAL_CONFIG.fontFamily);
            const ffc = PERSONAL_CONFIG.fontFamily[s.fontFamily || 'system'];
            if (ffc) document.body.classList.add(ffc);
            setPersonalActive('fontFamily', s.fontFamily || 'system');
        }

        function clearPersonalClasses(prefix, map) {
            Object.values(map).forEach(c => { if (c) document.body.classList.remove(c); });
        }
        function setPersonalActive(group, value) {
            document.querySelectorAll(`#${group}Options .personal-option`).forEach(el => el.classList.remove('active'));
            const target = document.querySelector(`#${group}Options .personal-option[data-value="${value}"]`);
            if (target) target.classList.add('active');
        }
        function savePersonalSettings(s) {
            localStorage.setItem('warehouseSettings', JSON.stringify(s));
        }
        function bindPersonalOption(group) {
            document.querySelectorAll(`#${group}Options .personal-option`).forEach(el => {
                el.addEventListener('click', function() {
                    const val = this.getAttribute('data-value');
                    personalSettings[group] = val;
                    savePersonalSettings(personalSettings);
                    applyPersonalSettings(personalSettings);
                });
            });
        }
        function openPersonalPanel() {
            document.getElementById('personalOverlay').classList.add('show');
        }
        function closePersonalPanel() {
            document.getElementById('personalOverlay').classList.remove('show');
        }

        // ===== 设置弹出菜单 =====
        function toggleSettingsPopup(e) {
            e.stopPropagation();
            const btn = document.getElementById('settingsBtn');
            const popup = document.getElementById('settingsPopup');
            const isOpen = popup.classList.contains('show');
            if (isOpen) {
                closeSettingsPopup();
            } else {
                popup.classList.add('show');
                btn.classList.add('active');
            }
        }
        function closeSettingsPopup() {
            document.getElementById('settingsPopup').classList.remove('show');
            document.getElementById('settingsBtn').classList.remove('active');
        }
        // settingsBtn 在 script 之前，可以直接绑定
        document.getElementById('settingsBtn').addEventListener('click', toggleSettingsPopup);
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.sidebar-bottom')) {
                closeSettingsPopup();
            }
        });
        // personalOverlay 在 script 之后，延迟绑定
        function bindOverlayEvent() {
            document.getElementById('personalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closePersonalPanel();
            });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bindOverlayEvent);
        } else {
            // script 在 body 中间执行时 DOM 未完全解析，用 requestAnimationFrame 延迟
            requestAnimationFrame(bindOverlayEvent);
        }
    </script>

    <!-- Personalization Panel -->
    <div class="personal-overlay" id="personalOverlay">
        <div class="personal-panel">
            <div class="personal-header">
                <h2>个性化设置</h2>
                <button class="personal-close" onclick="closePersonalPanel()">&times;</button>
            </div>
            <div class="personal-body">
                <div class="personal-section">
                    <div class="personal-label">主题</div>
                    <div class="personal-options" id="themeOptions">
                        <div class="personal-option" data-value="dark">
                            <span class="preview-dot" style="background:#0f1115"></span>深色
                        </div>
                        <div class="personal-option" data-value="light">
                            <span class="preview-dot" style="background:#f6f8fa"></span>浅色
                        </div>
                        <div class="personal-option" data-value="mint">
                            <span class="preview-dot" style="background:#0d1f1a"></span>薄荷绿
                        </div>
                        <div class="personal-option" data-value="beige">
                            <span class="preview-dot" style="background:#1a1714"></span>米色
                        </div>
                        <div class="personal-option" data-value="starry">
                            <span class="preview-dot" style="background:linear-gradient(135deg,#6366f1,#a78bfa)"></span>星空紫
                        </div>
                    </div>
                </div>
                <div class="personal-section">
                    <div class="personal-label">字体大小</div>
                    <div class="personal-options" id="fontOptions">
                        <div class="personal-option" data-value="small">小</div>
                        <div class="personal-option" data-value="medium">中</div>
                        <div class="personal-option" data-value="large">大</div>
                        <div class="personal-option" data-value="xlarge">超大</div>
                    </div>
                </div>
                <div class="personal-section">
                    <div class="personal-label">卡片密度</div>
                    <div class="personal-options" id="densityOptions">
                        <div class="personal-option" data-value="compact">紧凑</div>
                        <div class="personal-option" data-value="comfort">舒适</div>
                        <div class="personal-option" data-value="loose">宽松</div>
                    </div>
                </div>
                <div class="personal-section">
                    <div class="personal-label">侧边栏宽度</div>
                    <div class="personal-options" id="sidebarOptions">
                        <div class="personal-option" data-value="narrow">窄</div>
                        <div class="personal-option" data-value="medium">中</div>
                        <div class="personal-option" data-value="wide">宽</div>
                    </div>
                </div>
                <div class="personal-section">
                    <div class="personal-label">字体</div>
                    <div class="personal-options" id="fontFamilyOptions">
                        <div class="personal-option" data-value="system">系统默认</div>
                        <div class="personal-option" data-value="serif">宋体</div>
                        <div class="personal-option" data-value="sans">黑体</div>
                        <div class="personal-option" data-value="mono">等宽</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
