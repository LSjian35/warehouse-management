<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSjian35 - 个人主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-primary: #f0f0f5;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(99, 102, 241, 0.3);
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景动效 */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-gradient .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }
        .bg-gradient .orb-1 {
            width: 600px; height: 600px;
            background: #6366f1;
            top: -200px; right: -100px;
            animation-delay: 0s;
        }
        .bg-gradient .orb-2 {
            width: 500px; height: 500px;
            background: #8b5cf6;
            bottom: -150px; left: -100px;
            animation-delay: -7s;
        }
        .bg-gradient .orb-3 {
            width: 400px; height: 400px;
            background: #3b82f6;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
            opacity: 0.08;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* 网格背景 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        /* 导航 */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .nav-link {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }
        .nav-link.primary {
            background: var(--accent);
            color: white;
            font-weight: 500;
        }
        .nav-link.primary:hover {
            background: var(--accent-light);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* 主内容 */
        .main-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px;
        }

        /* Hero */
        .hero {
            text-align: center;
            max-width: 720px;
            animation: fadeUp 0.8s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 50px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        .hero-badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 20px;
        }
        .hero h1 .gradient-text {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 48px;
            font-weight: 300;
        }

        /* CTA 按钮组 */
        .cta-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 24px var(--accent-glow);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px var(--accent-glow);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-accent);
            transform: translateY(-2px);
        }
        .btn .btn-icon {
            font-size: 18px;
        }
        .btn .arrow {
            transition: transform 0.3s;
        }
        .btn:hover .arrow {
            transform: translateX(4px);
        }

        /* 功能卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            max-width: 720px;
            width: 100%;
            margin-top: 80px;
            animation: fadeUp 0.8s ease-out 0.3s backwards;
        }
        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            cursor: default;
        }
        .feature-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-accent);
            transform: translateY(-4px);
        }
        .feature-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--gradient-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
        }
        .feature-card h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .feature-card p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 15, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }
        .footer p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .footer a {
            color: var(--accent-light);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: var(--accent);
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .navbar { padding: 0 20px; }
            .hero h1 { font-size: 36px; letter-spacing: -1px; }
            .hero .subtitle { font-size: 16px; }
            .btn { padding: 12px 24px; font-size: 14px; }
            .features { grid-template-columns: 1fr; }
            .footer { padding: 16px 20px; }
        }
    </style>
</head>
<body>

    <!-- 背景 -->
    <div class="bg-gradient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-bg"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">LSjian35</div>
        <div class="nav-links">
            <a class="nav-link primary" href="warehouse.html">进入仓库</a>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-wrapper">
        <div class="hero">
            <div class="hero-badge">
                <span class="dot"></span>
                系统运行中
            </div>
            <h1>
                欢迎来到<br>
                <span class="gradient-text">个人仓库</span>
            </h1>
            <p class="subtitle">
                一个简洁高效的文件管理仓库，支持文件上传、分类管理和在线预览。<br>
                点击下方按钮开始使用。
            </p>
            <div class="cta-group">
                <a class="btn btn-primary" href="warehouse.html">
                    <span class="btn-icon">&#128230;</span>
                    进入仓库
                    <span class="arrow">&#8594;</span>
                </a>
            </div>
        </div>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">&#128193;</div>
                <h3>项目管理</h3>
                <p>创建项目、分类文件夹，层次清晰的管理结构</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">&#9729;&#65039;</div>
                <h3>云端存储</h3>
                <p>文件自动同步至 GitHub，安全可靠永久保存</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">&#128269;</div>
                <h3>快速查找</h3>
                <p>支持搜索和多种视图模式，快速定位文件</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <p>&copy; 2026 LSjian35 &middot; Powered by <a href="https://github.com" target="_blank">GitHub</a></p>
    </div>

</body>
</html>
