<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSjian35 - 个人主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070d;--card:rgba(255,255,255,0.025);--card-h:rgba(255,255,255,0.05);--accent:#6366f1;--accent-l:#818cf8;--glow:rgba(99,102,241,0.4);--t1:#f0f0f5;--t2:#9ca3af;--t3:#6b7280;--br:rgba(255,255,255,0.06);--ba:rgba(99,102,241,0.3);--g1:linear-gradient(135deg,#6366f1,#8b5cf6 50%,#a78bfa);--g2:linear-gradient(135deg,#3b82f6,#6366f1);--mx:50%;--my:50%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
.spotlight{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(600px circle at var(--mx) var(--my),rgba(99,102,241,0.06),transparent 40%)}
.bg-g{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;animation:fl 25s ease-in-out infinite}
.o1{width:700px;height:700px;background:#6366f1;top:-250px;right:-150px}
.o2{width:550px;height:550px;background:#8b5cf6;bottom:-200px;left:-150px;animation-delay:-8s}
.o3{width:450px;height:450px;background:#3b82f6;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-16s;opacity:.06}
@keyframes fl{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-40px) scale(1.08)}66%{transform:translate(-30px,30px) scale(.92)}}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px;z-index:0;pointer-events:none}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:rgba(255,255,255,.6);animation:tw var(--d) ease-in-out infinite;animation-delay:var(--dl)}
@keyframes tw{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 48px;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,13,.65);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--br)}
.brand{font-size:20px;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nlinks{display:flex;gap:12px;align-items:center}
.na{padding:10px 22px;border-radius:10px;font-size:14px;color:var(--t2);text-decoration:none;transition:.25s;cursor:pointer}
.na:hover{color:var(--t1);background:var(--card)}
.na.p{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 2px 12px var(--glow)}
.na.p:hover{background:var(--accent-l);box-shadow:0 4px 24px var(--glow);transform:translateY(-1px)}
.wrap{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:140px 24px 100px}
.hero{text-align:center;max-width:800px;animation:fu 1s cubic-bezier(.16,1,.3,1)}
@keyframes fu{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;border-radius:50px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);font-size:13px;color:#4ade80;margin-bottom:40px;animation:fu 1s cubic-bezier(.16,1,.3,1) .15s backwards}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 10px rgba(34,197,94,.7);animation:pu 2s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.hero h1{font-size:68px;font-weight:900;line-height:1.08;letter-spacing:-3px;margin-bottom:28px;animation:fu 1s cubic-bezier(.16,1,.3,1) .25s backwards}
.gt{background:linear-gradient(135deg,#6366f1,#8b5cf6 30%,#a78bfa 55%,#c4b5fd 75%,#8b5cf6);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gs 6s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(99,102,241,.35))}
@keyframes gs{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.sub{font-size:19px;color:var(--t2);line-height:1.7;margin-bottom:56px;font-weight:300;min-height:60px;animation:fu 1s cubic-bezier(.16,1,.3,1) .35s backwards}
.cur{display:inline-block;width:2px;height:1.1em;background:var(--accent-l);margin-left:2px;vertical-align:text-bottom;animation:bl .8s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.cta{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;animation:fu 1s cubic-bezier(.16,1,.3,1) .45s backwards}
.btn{display:inline-flex;align-items:center;gap:12px;padding:16px 40px;border-radius:14px;font-size:16px;font-weight:700;text-decoration:none;cursor:pointer;transition:.3s cubic-bezier(.4,0,.2,1);border:none;position:relative;overflow:hidden}
.bp{background:var(--g1);color:#fff;box-shadow:0 6px 32px var(--glow)}
.bp::after{content:'';position:absolute;top:-50%;left:-100%;width:60%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-20deg);transition:left .6s;pointer-events:none}
.bp:hover::after{left:140%}
.bp:hover{transform:translateY(-3px);box-shadow:0 12px 48px rgba(99,102,241,.5)}
.bp:active{transform:translateY(0)}
.bs{background:var(--card);color:var(--t1);border:1px solid var(--br);backdrop-filter:blur(12px)}
.bs:hover{background:var(--card-h);border-color:var(--ba);transform:translateY(-3px)}
.arrow{transition:transform .3s;display:inline-block}
.btn:hover .arrow{transform:translateX(5px)}
.feat{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;max-width:920px;width:100%;margin-top:96px;animation:fu 1s cubic-bezier(.16,1,.3,1) .6s backwards}
.fc{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:28px 22px;transition:.35s cubic-bezier(.4,0,.2,1);cursor:default;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.fc:hover{background:rgba(255,255,255,.05);border-color:var(--ba);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 40px rgba(99,102,241,.08)}
.fi{width:48px;height:48px;border-radius:14px;background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px;box-shadow:0 4px 20px rgba(99,102,241,.25)}
.fc h3{font-size:15px;font-weight:700;margin-bottom:10px}
.fc p{font-size:13px;color:var(--t3);line-height:1.6}
footer{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:22px 48px;display:flex;align-items:center;justify-content:center;background:rgba(7,7,13,.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--br);gap:24px}
footer p{font-size:13px;color:var(--t3);white-space:nowrap}
footer a{color:var(--accent-l);text-decoration:none;transition:color .2s}
footer a:hover{color:var(--accent)}
@media(max-width:900px){.feat{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){nav{padding:0 20px}.hero h1{font-size:34px;letter-spacing:-1.5px}.sub{font-size:16px}.btn{padding:14px 28px;font-size:15px}.feat{grid-template-columns:1fr 1fr;gap:12px}footer{padding:16px 20px}.wrap{padding:120px 20px 100px}}
@media(max-width:380px){.feat{grid-template-columns:1fr}.hero h1{font-size:28px}}
</style>
</head>
<body>
<div class="bg-g"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="grid-bg"></div>
<div class="spotlight"></div>
<div class="stars" id="sc"></div>
<nav><div class="brand">LSjian35</div><div class="nlinks"><a class="na p" href="warehouse.html">进入仓库</a></div></nav>
<div class="wrap">
<div class="hero">
<div class="badge"><span class="dot"></span>系统运行中</div>
<h1>欢迎来到<br><span class="gt">LSjian35的仓库</span></h1>
<p class="sub"><span id="tt"></span><span class="cur"></span></p>
<div class="cta">
<a class="btn bp" href="warehouse.html"><span>&#128230;</span>进入仓库<span class="arrow">&#8594;</span></a>
</div>
</div>
<div class="feat">
<div class="fc"><div class="fi">&#128193;</div><h3>项目管理</h3><p>创建项目、分类文件夹，层次清晰的管理结构</p></div>
<div class="fc"><div class="fi">&#9729;&#65039;</div><h3>云端存储</h3><p>文件自动同步至 GitHub，安全可靠永久保存</p></div>
<div class="fc"><div class="fi">&#128269;</div><h3>快速查找</h3><p>支持搜索和多种视图模式，快速定位文件</p></div>
<div class="fc"><div class="fi">&#128274;</div><h3>安全可靠</h3><p>管理员密码保护，确保数据安全</p></div>
<div class="fc"><div class="fi">&#127760;</div><h3>多端访问</h3><p>随时随地通过浏览器访问你的文件</p></div>
</div>
</div>
<footer>
<p>&copy; 2026 LSjian35 &middot; Powered by <a href="https://github.com" target="_blank">GitHub</a></p>
<a href="index.html" style="margin-left:16px">返回主页</a>
</footer>
<script>
(function(){var c=document.getElementById('sc'),f=document.createDocumentFragment();for(var i=0;i<80;i++){var s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--d',(2+Math.random()*4).toFixed(1)+'s');s.style.setProperty('--dl',(Math.random()*5).toFixed(1)+'s');var z=(1+Math.random()*2).toFixed(1);s.style.width=z+'px';s.style.height=z+'px';f.appendChild(s);}c.appendChild(f);})();
document.addEventListener('mousemove',function(e){document.documentElement.style.setProperty('--mx',e.clientX+'px');document.documentElement.style.setProperty('--my',e.clientY+'px');});
(function(){var ph=['一个简洁高效的文件管理仓库，支持文件上传、分类管理和在线预览。','点击下方按钮开始使用。'],el=document.getElementById('tt'),pi=0,ci=0,dl=false;function tk(){var t=ph[pi];if(!dl){ci++;el.textContent=t.substring(0,ci);if(ci>=t.length){if(pi<ph.length-1){dl=true;setTimeout(tk,800);return;}else{el.textContent=ph.join(' ');return;}}setTimeout(tk,50+Math.random()*40);}else{ci--;el.textContent=t.substring(0,ci);if(ci<=0){dl=false;pi++;setTimeout(tk,300);return;}setTimeout(tk,25);}}setTimeout(tk,1200);})();
</script>
</body>
</html>
